get:
  tags:
    - Contacts
  summary: Get all contacts
  operationId: getContacts
  description: Returns a list of all contacts for the authenticated user
  security:
    - bearerAuth: []
  parameters:
    - in: query
      name: page
      schema:
        type: integer
        default: 1
      description: Page number
    - in: query
      name: perPage
      schema:
        type: integer
        default: 10
      description: Number of contacts per page
    - in: query
      name: sortBy
      schema:
        type: string
        default: name
      description: Field to sort by
    - in: query
      name: sortOrder
      schema:
        type: string
        enum: [asc, desc]
        default: asc
      description: Sort order
    - in: query
      name: type
      schema:
        type: string
        enum: [work, home, personal]
      description: Filter by contact type
    - in: query
      name: isFavourite
      schema:
        type: boolean
      description: Filter by favourite status
  responses:
    '200':
      description: Successfully retrieved contacts
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: Successfully found contacts!
              data:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: ../../components/contact.yaml
                  page:
                    type: integer
                    example: 1
                  perPage:
                    type: integer
                    example: 10
                  totalItems:
                    type: integer
                    example: 100
                  totalPages:
                    type: integer
                    example: 10
                  hasPreviousPage:
                    type: boolean
                    example: false
                  hasNextPage:
                    type: boolean
                    example: true
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/error.yaml

post:
  tags:
    - Contacts
  summary: Create a contact
  operationId: createContact
  description: Creates a new contact for the authenticated user
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          required:
            - name
            - phoneNumber
            - contactType
          properties:
            name:
              type: string
              example: John Doe
            phoneNumber:
              type: string
              example: '+905551234567'
            email:
              type: string
              example: john@example.com
            isFavourite:
              type: boolean
              example: false
            contactType:
              type: string
              enum: [work, home, personal]
              example: personal
            photo:
              type: string
              format: binary
  responses:
    '201':
      description: Successfully created a contact
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 201
              message:
                type: string
                example: Successfully created a contact!
              data:
                $ref: ../../components/contact.yaml
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/error.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/error.yaml
