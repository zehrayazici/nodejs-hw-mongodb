get:
  tags:
    - Contacts
  summary: Get contact by ID
  operationId: getContactById
  description: Returns a single contact by ID
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: contactId
      required: true
      schema:
        type: string
        example: 67e2808ee1f6c97ed9ae40e1
      description: Contact ID
  responses:
    '200':
      description: Successfully retrieved contact
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: Successfully found contact with id 67e2808ee1f6c97ed9ae40e1!
              data:
                $ref: ../../../components/contact.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../../components/error.yaml
    '404':
      description: Contact not found
      content:
        application/json:
          schema:
            $ref: ../../../components/error.yaml

patch:
  tags:
    - Contacts
  summary: Update contact by ID
  operationId: updateContact
  description: Updates an existing contact by ID
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: contactId
      required: true
      schema:
        type: string
        example: 67e2808ee1f6c97ed9ae40e1
      description: Contact ID
  requestBody:
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            name:
              type: string
              example: John Doe
            phoneNumber:
              type: string
              example: '+905551234567'
            email:
              type: string
              example: john@example.com
            isFavourite:
              type: boolean
              example: false
            contactType:
              type: string
              enum: [work, home, personal]
              example: personal
            photo:
              type: string
              format: binary
  responses:
    '200':
      description: Successfully updated contact
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: Successfully patched a contact!
              data:
                $ref: ../../../components/contact.yaml
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../../components/error.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../../components/error.yaml
    '404':
      description: Contact not found
      content:
        application/json:
          schema:
            $ref: ../../../components/error.yaml

delete:
  tags:
    - Contacts
  summary: Delete contact by ID
  operationId: deleteContact
  description: Deletes a contact by ID
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: contactId
      required: true
      schema:
        type: string
        example: 67e2808ee1f6c97ed9ae40e1
      description: Contact ID
  responses:
    '204':
      description: Successfully deleted contact
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../../components/error.yaml
    '404':
      description: Contact not found
      content:
        application/json:
          schema:
            $ref: ../../../components/error.yaml
